function loadOutline(id){
  const ol=outlines.find(x=>x.id===id);if(!ol)return;
  currentOutlineId=ol.id;
  currentOutline=[...ol.items];
  document.getElementById('outlineTitleIn').value=ol.title;
  renderAllPostsPanel();renderOutlineFeed();renderSavedOutlinesBar();
}

function deleteOutline(id){
  if(!confirm('このアウトラインを削除しますか？'))return;
  outlines=outlines.filter(x=>x.id!==id);
  if(currentOutlineId===id){currentOutlineId=null;}
  save();renderSavedOutlinesBar();
}

function buildOutCard(it,idx){
  const isReply=it.id.startsWith('reply:');
  const lvl=it.level||0;
  let preview, timeStr;
  if(isReply){
    preview=esc(it._replyContent||'');
    timeStr=it._replyCreatedAt?fmtDt(it._replyCreatedAt):'';
  } else {
    const p=posts.find(x=>x.id===it.id);
    preview=p?esc(cleanText(p.content)):'（削除済み）';
    timeStr=p?fmtDt(p.createdAt):'';
  }
  const replyIcon=isReply?`<span style="font-size:10px;color:var(--text3);flex-shrink:0;margin-right:2px;">↩</span>`:'';
  return`<div class="outline-item" data-level="${lvl}" id="oitem-${idx}">
    <div class="out-card" id="ocard-${idx}"
      draggable="true"
      ondragstart="onOutDragStart(event,${idx})" ondragend="onOutDragEnd()"
      ondragover="onOutDragOver(event,${idx})" ondragleave="onOutDragLeave(${idx})" ondrop="onOutDrop(event,${idx})">
      <div class="out-card-body">
        <div class="out-level-btns">
          <button class="out-lv-btn" onclick="outOutdent(${idx})" ${lvl>0?'':'disabled'}>←</button>
          <button class="out-lv-btn" onclick="outIndent(${idx})" ${lvl<MAX_LEVEL?'':'disabled'}>→</button>
        </div>
        <span class="out-grip">⠿</span>
        ${replyIcon}
        <div class="out-text">${preview}</div>
      </div>
      <div class="out-card-foot">
        <span class="out-time">${timeStr}</span>
        <button class="out-remove" onclick="removeOutItem(${idx})">✕</button>
      </div>
    </div>
  </div>`;
}

function removeOutItem(idx){
  const it=currentOutline[idx];if(!it)return;
  if(it.id.startsWith('reply:')){
    currentOutline.splice(idx,1);
  } else {
    // 元投稿と紐づく返信アイテムも削除
    removeFromOutline(it.id);return;
  }
  renderAllPostsPanel();renderOutlineFeed();
}

function outIndent(idx){if(currentOutline[idx]&&currentOutline[idx].level<MAX_LEVEL){currentOutline[idx].level++;renderOutlineFeed();}}
function outOutdent(idx){if(currentOutline[idx]&&currentOutline[idx].level>0){currentOutline[idx].level--;renderOutlineFeed();}}

// outline drag
function onOutDragStart(e,idx){outDragIdx=idx;e.dataTransfer.effectAllowed='move';setTimeout(()=>document.getElementById('ocard-'+idx)?.classList.add('dragging'),0);}
function onOutDragEnd(){document.querySelectorAll('.out-card').forEach(c=>c.classList.remove('dragging','drag-over-above','drag-over-below'));outDragIdx=null;}
function onOutDragOver(e,idx){
  e.preventDefault();if(outDragIdx===null||outDragIdx===idx)return;
  document.querySelectorAll('.out-card').forEach(c=>c.classList.remove('drag-over-above','drag-over-below'));
  const card=document.getElementById('ocard-'+idx);if(!card)return;
  const rect=card.getBoundingClientRect();
  card.classList.add(e.clientY<rect.top+rect.height/2?'drag-over-above':'drag-over-below');
}
function onOutDragLeave(idx){document.getElementById('ocard-'+idx)?.classList.remove('drag-over-above','drag-over-below');}
function onOutDrop(e,idx){
  e.preventDefault();const card=document.getElementById('ocard-'+idx);if(!card||outDragIdx===null||outDragIdx===idx)return;
  const above=card.classList.contains('drag-over-above');card.classList.remove('drag-over-above','drag-over-below');
  const moved=currentOutline.splice(outDragIdx,1)[0];
  let t=idx;if(outDragIdx<idx)t--;
  currentOutline.splice(Math.max(0,Math.min(above?t:t+1,currentOutline.length)),0,moved);
  renderOutlineFeed();renderAllPostsPanel();
}

function goToNote(){
  if(!currentOutline.length){alert('アウトラインにメモを追加してください');return;}
  const title=document.getElementById('outlineTitleIn').value.trim()||'無題のノート';
  let n=notes.find(x=>x.id===currentNoteId);
  if(!n){
    n={id:uid(),title,body:'',paragraphs:[],items:[],stickies:[],createdAt:Date.now(),updatedAt:Date.now()};
    notes.push(n);
  } else {
    n.title=title;
  }
  n.items=[...currentOutline];
  const newParas=outlineToParas(currentOutline);
  if(!n.paragraphs.length)n.paragraphs=newParas;
  n.updatedAt=Date.now();
  currentNoteId=n.id;
  save();switchPhase(3);
  setTimeout(()=>{openNote(n.id);},30);
}

// アウトラインアイテム配列 → 段落テキスト配列（reply: も含む）
function outlineToParas(items){
  return items.map(it=>{
    if(it.id.startsWith('reply:'))return it._replyContent?cleanText(it._replyContent):'';
    const p=posts.find(x=>x.id===it.id);return p?cleanText(p.content):'';
  }).filter(Boolean);
}

// ─── Phase 3: Note Editor ────────────────────────────────
function renderNotesList(){
  const list=document.getElementById('notesList');
  if(!notes.length){list.innerHTML=`<div class="empty-state" style="padding:1rem .75rem">ノートなし</div>`;return;}
  list.innerHTML=notes.sort((a,b)=>b.updatedAt-a.updatedAt).map(n=>`
    <div class="note-li ${n.id===currentNoteId?'active':''}" onclick="openNote('${n.id}')">
      <div class="note-li-title">${esc(n.title||'無題')}</div>
      <div class="note-li-meta">${fmtDate(n.updatedAt)}</div>
    </div>`).join('');
}
function toggleOutlineLoadMenu(){
  const menu=document.getElementById('outlineLoadMenu');
  if(!menu)return;
  if(menu.style.display!=='none'){menu.style.display='none';return;}
  // メニューを構築
  if(!outlines.length){
    menu.innerHTML=`<div style="padding:10px 12px;font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:11px;color:var(--text3);">保存済みアウトラインがありません</div>`;
  } else {
    menu.innerHTML=outlines.sort((a,b)=>b.updatedAt-a.updatedAt).map(ol=>`
      <div onclick="loadOutlineIntoNote('${ol.id}')"
        style="padding:9px 14px;cursor:pointer;border-bottom:0.5px solid var(--border);font-family:'Hiragino Kaku Gothic ProN',sans-serif;">
        <div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(ol.title)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px;">${ol.items.length}件 · ${fmtDate(ol.updatedAt)}</div>
      </div>`).join('')+
      `<div onclick="loadOutlineIntoNote(null)"
        style="padding:8px 14px;cursor:pointer;font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:11px;color:var(--teal);">
        ② アウトラインに移動…
      </div>`;
  }
  menu.style.display='block';
}
function loadOutlineIntoNote(outlineId){
  const menu=document.getElementById('outlineLoadMenu');
  if(menu)menu.style.display='none';
  if(!outlineId){switchPhase(2);return;}
  const ol=outlines.find(x=>x.id===outlineId);if(!ol)return;
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  if(n.paragraphs.length&&!confirm(`現在の段落に追記しますか？\n（「キャンセル」で上書き）`)){
    n.paragraphs=[];
  }
  const newParas=outlineToParas(ol.items);
  n.paragraphs.push(...newParas);
  n.items=[...ol.items];
  if(!n.title||n.title==='無題のノート')n.title=ol.title;
  document.getElementById('editorTitle').value=n.title;
  n.updatedAt=Date.now();save();renderParaEditor();renderNotesList();
}
// メニュー外クリックで閉じる
document.addEventListener('click',e=>{
  const btn=document.getElementById('outlineLoadBtn');
  const menu=document.getElementById('outlineLoadMenu');
  if(menu&&!menu.contains(e.target)&&e.target!==btn)menu.style.display='none';
});
function toggleNotesList(){
  const panel=document.getElementById('notesListPanel');
  panel.classList.toggle('collapsed');
  const btn=panel.querySelector('.panel-toggle-btn');
  if(btn)btn.textContent=panel.classList.contains('collapsed')?'▶':'◀';
}
function openNote(id){
  currentNoteId=id;const n=notes.find(x=>x.id===id);if(!n)return;
  renderNotesList();
  document.getElementById('editorEmpty').style.display='none';
  const ea=document.getElementById('editorActive');ea.style.display='flex';
  document.getElementById('editorTitle').value=n.title||'';
  if(!n.paragraphs)n.paragraphs=n.body?n.body.split('\n').filter(l=>l.trim()):[];
  renderParaEditor();
  setupScrollSync();
}
function showEditorEmpty(){
  document.getElementById('editorEmpty').style.display='flex';
  document.getElementById('editorActive').style.display='none';
}
function createBlankNote(){
  const n={id:uid(),title:'無題のノート',body:'',paragraphs:[],items:[],stickies:[],createdAt:Date.now(),updatedAt:Date.now()};
  notes.push(n);currentNoteId=n.id;save();renderNotesList();openNote(n.id);
  setTimeout(()=>document.getElementById('editorTitle').select(),50);
}
function saveNoteTitle(){const n=notes.find(x=>x.id===currentNoteId);if(!n)return;n.title=document.getElementById('editorTitle').value;n.updatedAt=Date.now();save();renderNotesList();}
function deleteCurrentNote(){
  if(!currentNoteId||!confirm('削除しますか？'))return;
  notes=notes.filter(x=>x.id!==currentNoteId);currentNoteId=null;save();renderNotesList();showEditorEmpty();
}

// ─── Para Editor ─────────────────────────────────────────
function renderParaEditor(){
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  if(!n.paragraphs)n.paragraphs=[];
  const editor=document.getElementById('paraEditor');
  editor.innerHTML='';
  const paras=n.paragraphs.length?n.paragraphs:[''];
  paras.forEach((para,i)=>{
    const row=document.createElement('div');row.className='para-row';row.dataset.idx=i;
    const ta=document.createElement('textarea');
    ta.className='para-input';ta.value=para;ta.rows=1;
    ta.placeholder=i===0?'書き始める…':'';ta.dataset.idx=i;
    setTimeout(()=>autoH(ta),0);
    ta.addEventListener('input',()=>{autoH(ta);n.paragraphs[i]=ta.value;n.updatedAt=Date.now();save();updateEditorStats();});
    ta.addEventListener('keydown',e=>onParaKey(e,i));
    ta.addEventListener('focus',()=>highlightStickiesForPara(n.paragraphs[i]));
    const addBtn=document.createElement('button');
    addBtn.className='para-add-sticky';addBtn.textContent='＋ 付箋';
    addBtn.onclick=()=>addStickyToParaIdx(i,ta.value);
    row.appendChild(ta);row.appendChild(addBtn);
    editor.appendChild(row);
  });
  const addPBtn=document.createElement('button');addPBtn.className='para-add-btn';addPBtn.textContent='＋ 段落を追加';addPBtn.onclick=()=>addPara();
  editor.appendChild(addPBtn);
  setTimeout(()=>{editor.querySelectorAll('.para-input').forEach(autoH);updateEditorStats();renderStickyPaneB();},30);
}

function autoH(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}

function onParaKey(e,i){
  const n=notes.find(x=>x.id===currentNoteId);if(!n||!n.paragraphs)return;
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addPara(i+1);}
  if(e.key==='Backspace'&&e.target.value===''&&n.paragraphs.length>1){e.preventDefault();removePara(i);}
  if(e.key==='Tab'){e.preventDefault();const t=e.target,s=t.selectionStart;t.value=t.value.slice(0,s)+'  '+t.value.slice(s);t.selectionStart=t.selectionEnd=s+2;n.paragraphs[i]=t.value;save();}
}
function addPara(afterIdx){
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  if(!n.paragraphs)n.paragraphs=[];
  const insertAt=afterIdx!=null?afterIdx:n.paragraphs.length;
  n.paragraphs.splice(insertAt,0,'');n.body=n.paragraphs.join('\n');n.updatedAt=Date.now();save();
  renderParaEditor();
  setTimeout(()=>{const blocks=document.getElementById('paraEditor').querySelectorAll('.para-input');if(blocks[insertAt])blocks[insertAt].focus();},30);
}
function removePara(i){
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  n.paragraphs.splice(i,1);if(!n.paragraphs.length)n.paragraphs=[''];
  n.body=n.paragraphs.join('\n');n.updatedAt=Date.now();save();
  renderParaEditor();
  setTimeout(()=>{const blocks=document.getElementById('paraEditor').querySelectorAll('.para-input');const fi=Math.max(0,i-1);if(blocks[fi]){blocks[fi].focus();const l=blocks[fi].value.length;blocks[fi].setSelectionRange(l,l);}},30);
}

// ─── Stats ───────────────────────────────────────────────
function updateEditorStats(){
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  const paras=(n.paragraphs||[]).filter(l=>l.trim());
  const chars=paras.join('').replace(/\s/g,'').length;
  const lineW=parseInt(document.getElementById('lineWidthIn')?.value||40)||40;
  let lines=0;paras.forEach(p=>{lines+=Math.max(1,Math.ceil(p.replace(/\s/g,'').length/lineW));});
  document.getElementById('statChars').textContent=chars.toLocaleString();
  document.getElementById('statParas').textContent=paras.length;
  document.getElementById('statLines').textContent=lines;
}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('lineWidthIn')?.addEventListener('input',updateEditorStats);});

// ─── Sticky Pane B ───────────────────────────────────────
function setupScrollSync(){
  const pe=document.getElementById('paraEditor');
  const sf=document.getElementById('stickyFeedB');
  if(!pe||!sf)return;
  pe.onscroll=()=>{if(_syncScrolling)return;_syncScrolling=true;sf.scrollTop=pe.scrollTop;requestAnimationFrame(()=>{_syncScrolling=false;});};
  sf.onscroll=()=>{if(_syncScrolling)return;_syncScrolling=true;pe.scrollTop=sf.scrollTop;requestAnimationFrame(()=>{_syncScrolling=false;});};
}

function renderStickyPaneB(){
  const feed=document.getElementById('stickyFeedB');if(!feed)return;
  const editor=document.getElementById('paraEditor');
  const n=notes.find(x=>x.id===currentNoteId);
  feed.innerHTML='';
  if(!n||!(n.stickies||[]).length){feed.style.minHeight='';feed.innerHTML=`<div style="padding:1.5rem .5rem;font-size:11px;color:var(--text3);text-align:center;font-family:'Hiragino Kaku Gothic ProN',sans-serif">「＋」または段落の「＋ 付箋」で追加</div>`;return;}
  const paraTopMap={};const paraOrder={};
  (n.paragraphs||[]).forEach((p,i)=>{if(p.trim())paraOrder[p]=i;});
  if(editor){editor.querySelectorAll('.para-input').forEach(ta=>{if(ta.value.trim())paraTopMap[ta.value]=ta.offsetTop;});}
  const anchored=(n.stickies||[]).filter(s=>s.anchor&&paraTopMap[s.anchor]!=null);
  const unanchored=(n.stickies||[]).filter(s=>!s.anchor||paraTopMap[s.anchor]==null);
  anchored.sort((a,b)=>{const ia=paraOrder[a.anchor]??99999;const ib=paraOrder[b.anchor]??99999;return ia!==ib?ia-ib:(n.stickies||[]).indexOf(a)-(n.stickies||[]).indexOf(b);});
  const GAP=6;let nextTop=8;
  anchored.forEach(s=>{
    const idealTop=paraTopMap[s.anchor]??0;const top=Math.max(nextTop,idealTop);
    const card=buildStickyCardB(s);card.style.top=top+'px';feed.appendChild(card);nextTop=top+card.offsetHeight+GAP;
  });
  if(unanchored.length){
    const sep=document.createElement('div');sep.className='sticky-unanchored-sep';sep.style.top=nextTop+'px';sep.textContent='段落未指定';feed.appendChild(sep);nextTop+=sep.offsetHeight+4;
    unanchored.forEach(s=>{const card=buildStickyCardB(s);card.style.top=nextTop+'px';feed.appendChild(card);nextTop+=card.offsetHeight+GAP;});
  }
  const editorH=editor?editor.scrollHeight:0;
  feed.style.minHeight=Math.max(editorH,nextTop+24)+'px';
}

function buildStickyCardB(s){
  const card=document.createElement('div');
  card.className='sticky-card-b'+(s.color==='green'?' color-green':'');card.id='scb-'+s.id;
  const lbl=document.createElement('div');
  lbl.className='sticky-para-label'+(s.anchor?' linked':'');
  lbl.title=s.anchor?s.anchor:'段落に紐付ける';
  lbl.textContent=s.anchor?'¶ '+truncate(s.anchor,28):'＋ 段落に紐付ける';
  lbl.onclick=(e)=>{e.stopPropagation();openAnchorPicker(s.id,lbl);};
  card.appendChild(lbl);
  const hd=document.createElement('div');hd.className='sticky-card-b-hd';
  const colorDot=document.createElement('button');colorDot.className='sticky-color-dot';colorDot.title='色を切り替え';colorDot.onclick=()=>toggleStickyColorB(s.id);
  const delBtn=document.createElement('button');delBtn.className='sticky-del-b';delBtn.textContent='✕';delBtn.onclick=()=>deleteStickyB(s.id);
  hd.appendChild(colorDot);hd.appendChild(delBtn);card.appendChild(hd);
  const ta=document.createElement('textarea');
  ta.className='sticky-ta-b';ta.placeholder='メモ・疑問・TODO…';ta.value=s.text||'';
  setTimeout(()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';},0);
  ta.addEventListener('input',e=>{
    const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
    const st=n.stickies.find(x=>x.id===s.id);if(!st)return;
    st.text=e.target.value;n.updatedAt=Date.now();save();
    e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';
  });
  ta.addEventListener('focus',()=>{
    document.querySelectorAll('.para-input').forEach(el=>el.classList.remove('sticky-linked'));
    if(s.anchor){for(const el of document.querySelectorAll('.para-input')){if(el.value===s.anchor){el.classList.add('sticky-linked');break;}}highlightStickiesForPara(s.anchor);}
  });
  ta.addEventListener('blur',()=>{document.querySelectorAll('.para-input').forEach(el=>el.classList.remove('sticky-linked'));document.querySelectorAll('.sticky-card-b').forEach(el=>el.classList.remove('is-active'));});
  card.appendChild(ta);return card;
}

function addStickyToParaIdx(idx,liveVal){
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  const para=(liveVal!==undefined?liveVal:(n.paragraphs[idx]||'')).trim();
  if(liveVal!==undefined&&n.paragraphs[idx]!==undefined)n.paragraphs[idx]=liveVal;
  const s={id:uid(),text:'',anchor:para||null,color:'yellow',createdAt:Date.now()};
  n.stickies.push(s);n.updatedAt=Date.now();save();
  renderStickyPaneB();
  setTimeout(()=>{const card=document.getElementById('scb-'+s.id);if(card){card.querySelector('textarea')?.focus();card.scrollIntoView({behavior:'smooth',block:'nearest'});}},50);
}
function addStickyUnanchored(){
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  const s={id:uid(),text:'',anchor:null,color:'yellow',createdAt:Date.now()};
  n.stickies.push(s);n.updatedAt=Date.now();save();renderStickyPaneB();
  setTimeout(()=>document.getElementById('scb-'+s.id)?.querySelector('textarea')?.focus(),50);
}
function toggleStickyColorB(sid){const n=notes.find(x=>x.id===currentNoteId);if(!n)return;const s=n.stickies.find(x=>x.id===sid);if(!s)return;s.color=s.color==='green'?'yellow':'green';n.updatedAt=Date.now();save();renderStickyPaneB();}
function deleteStickyB(sid){const n=notes.find(x=>x.id===currentNoteId);if(!n)return;n.stickies=n.stickies.filter(x=>x.id!==sid);n.updatedAt=Date.now();save();renderStickyPaneB();}
function highlightStickiesForPara(anchor){
  document.querySelectorAll('.sticky-card-b').forEach(el=>el.classList.remove('is-active'));
  if(!anchor)return;const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  (n.stickies||[]).forEach(s=>{if(s.anchor===anchor){const el=document.getElementById('scb-'+s.id);if(el){el.classList.add('is-active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}}});
}

// ─── Anchor Picker ───────────────────────────────────────
function openAnchorPicker(sid,labelEl){
  _pickerStickyId=sid;const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  const paras=(n.paragraphs||[]).filter(p=>p.trim().length>0);
  const popup=document.getElementById('anchorPickerPopup');
  popup.innerHTML=`<div class="ap-pop-title">紐付ける段落を選択</div>`;
  const none=document.createElement('div');none.className='ap-pop-item none-item';none.textContent='（紐付けを外す）';none.onclick=()=>setAnchorForSticky(sid,null);popup.appendChild(none);
  paras.forEach(p=>{const item=document.createElement('div');item.className='ap-pop-item';item.textContent=truncate(p,50);item.title=p;item.onclick=()=>setAnchorForSticky(sid,p);popup.appendChild(item);});
  if(!paras.length){const empty=document.createElement('div');empty.className='ap-pop-item none-item';empty.textContent='段落を書いてから選択してください';popup.appendChild(empty);}
  const rect=labelEl.getBoundingClientRect();popup.style.display='block';
  const pw=230;let left=rect.left;if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  popup.style.left=left+'px';popup.style.top=(rect.bottom+4)+'px';
}
function setAnchorForSticky(sid,para){
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  const s=n.stickies.find(x=>x.id===sid);if(!s)return;
  s.anchor=para||null;n.updatedAt=Date.now();save();
  document.getElementById('anchorPickerPopup').style.display='none';_pickerStickyId=null;
  renderStickyPaneB();
}
document.addEventListener('click',e=>{
  const popup=document.getElementById('anchorPickerPopup');
  if(popup&&popup.style.display!=='none'&&!popup.contains(e.target)&&!e.target.classList.contains('sticky-para-label'))popup.style.display='none';
});
function scrollToAnchor(anchor){
  if(!anchor)return;
  document.querySelectorAll('.para-input').forEach(ta=>ta.classList.remove('anchor-highlight'));
  for(const ta of document.querySelectorAll('.para-input')){
    if(ta.value===anchor){ta.scrollIntoView({behavior:'smooth',block:'center'});ta.focus();ta.classList.add('anchor-highlight');setTimeout(()=>ta.classList.remove('anchor-highlight'),1800);break;}
  }
}

// ─── Export ──────────────────────────────────────────────
function exportObsidian(){
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  const srcPosts=n.items.map(it=>posts.find(p=>p.id===it.id)).filter(Boolean);
  const tags=[...new Set(srcPosts.flatMap(p=>extractTags(p.content)))];
  let md=`---\ntags: [${tags.join(', ')}]\ncreated: ${fmtDateISO(n.createdAt)}\nupdated: ${fmtDateISO(n.updatedAt)}\n---\n\n# ${n.title||'無題'}\n\n`;
  (n.paragraphs||[]).forEach(para=>{
    if(!para.trim())return;md+=para+'\n\n';
    (n.stickies||[]).filter(s=>s.anchor===para&&s.text).forEach(s=>{md+=`> **[付箋${s.color==='green'?'🟢':'🟡'}]** ${s.text}\n\n`;});
  });
  const unanchored=(n.stickies||[]).filter(s=>!s.anchor&&s.text);
  if(unanchored.length){md+=`---\n\n## 付箋（段落未指定）\n\n`;unanchored.forEach(s=>{md+=`> ${s.text}\n\n`;});}
  if(n.items.length){md+=`---\n\n## 元メモ\n\n`;n.items.forEach(it=>{const p=posts.find(x=>x.id===it.id);if(!p)return;const ind='  '.repeat(it.level||0);md+=`${ind}- ${cleanText(p.content).replace(/\n/g,' ')}\n`;});}
  dl(new Blob([md],{type:'text/markdown;charset=utf-8'}),(n.title||'note')+'.md');
}
function exportPlain(){
  const n=notes.find(x=>x.id===currentNoteId);if(!n)return;
  let t=`【${n.title||'無題'}】\n更新：${fmtDate(n.updatedAt)}\n\n`;
  (n.paragraphs||[]).forEach(para=>{if(para.trim())t+=para+'\n\n';});
  if(n.stickies?.some(s=>s.text)){t+=`---\n付箋メモ：\n\n`;n.stickies.forEach(s=>{if(s.text)t+=`[${s.anchor||'段落未指定'}]\n${s.text}\n\n`;});}
  dl(new Blob([t],{type:'text/plain;charset=utf-8'}),(n.title||'note')+'.txt');
}

// modal (phase 3 create from modal)
function createNoteFromModal(){
  const title=document.getElementById('noteModalTitle').value.trim()||'無題のノート';
  const n={id:uid(),title,body:'',paragraphs:[],items:[],stickies:[],createdAt:Date.now(),updatedAt:Date.now()};
  notes.push(n);save();document.getElementById('noteModal').classList.remove('open');
  currentNoteId=n.id;renderNotesList();openNote(n.id);
}

function onComposeKey(e){
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();submitPost();return;}
  setTimeout(()=>{const t=e.target;t.style.height='auto';t.style.height=Math.min(180,t.scrollHeight)+'px';},0);
}
