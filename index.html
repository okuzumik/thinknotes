<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkNotes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f3ee; --bg2:#ffffff; --bg3:#f0ede6; --surface:#e8e4db; --surface2:#dedad0;
  --border:#dbd6ca; --border2:#c8c2b4;
  --text:#1c1a14; --text2:#5a5446; --text3:#9a9080;
  --accent:#7a5c1e; --accent-d:#5a4214; --accent-l:#f5edda; --accent-m:#c8960a;
  --red:#b03828; --red-l:#fdf0ee;
  --teal:#2a7a58; --teal-l:#e8f5ee;
  --sticky:#eae5d8; --sticky-b:#b8a880; --sticky2:#dce6df; --sticky2-b:#7a9e8c;
  --r:9px; --rsm:6px; --indent:22px;
}
body {
  background:var(--bg); color:var(--text);
  font-family:'Hiragino Mincho ProN','Yu Mincho','ＭＳ 明朝',Georgia,serif;
  font-size:15px; line-height:1.75; height:100vh;
  display:flex; flex-direction:column; overflow:hidden;
}

/* ═══════════════════════════════
   TOP BAR + PHASE STEPS
   ═══════════════════════════════ */
.topbar {
  display:flex; align-items:center;
  padding:0 1.25rem; height:48px;
  border-bottom:0.5px solid var(--border);
  flex-shrink:0; background:var(--bg3); gap:0;
}
.app-name {
  font-family:'Hiragino Kaku Gothic ProN',sans-serif;
  font-size:13px; font-weight:700; color:var(--accent);
  letter-spacing:.06em; margin-right:2rem; flex-shrink:0;
}

/* フェーズステップ */
.phase-steps { display:flex; align-items:center; gap:0; flex:1; }
.phase-step {
  display:flex; align-items:center; gap:8px;
  padding:5px 14px;
  background:none; border:none; cursor:pointer;
  font-family:'Hiragino Kaku Gothic ProN',sans-serif;
  font-size:12px; color:var(--text3);
  border-radius:var(--rsm); transition:all .12s;
}
.phase-step:hover { background:var(--surface); color:var(--text2); }
.phase-step.active { background:var(--accent-l); color:var(--accent); font-weight:600; }
.phase-num {
  width:18px; height:18px; border-radius:50%;
  border:1.5px solid currentColor;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; flex-shrink:0;
}
.phase-step.active .phase-num { background:var(--accent); color:#fff; border-color:var(--accent); }
.phase-arrow { color:var(--border2); margin:0 4px; font-size:11px; user-select:none; }

.topbar-right { display:flex; align-items:center; gap:8px; margin-left:auto; }
.search-wrap { position:relative; width:180px; }
.search-in { width:100%; padding:5px 10px 5px 27px; background:var(--bg2); border:0.5px solid var(--border); border-radius:20px; font-size:12px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; color:var(--text); outline:none; }
.search-in::placeholder { color:var(--text3); }
.search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--text3); pointer-events:none; }

/* ═══════════════════════════════
   LAYOUT
   ═══════════════════════════════ */
.main { display:flex; flex:1; overflow:hidden; }

/* ─ Tag Sidebar ─ */
.tag-sidebar {
  width:160px; flex-shrink:0;
  border-right:0.5px solid var(--border);
  overflow-y:auto; background:var(--bg);
  padding:.75rem 0;
}
.sb-section { margin-bottom:1rem; }
.sb-head { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; letter-spacing:.1em; color:var(--text3); padding:0 12px; margin-bottom:3px; }
.sb-item { display:flex; align-items:center; gap:7px; padding:5px 12px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px; color:var(--text2); cursor:pointer; transition:all .1s; }
.sb-item:hover { background:var(--bg3); color:var(--text); }
.sb-item.active { background:var(--accent-l); color:var(--accent); }
.sb-tag-dot { width:6px; height:6px; border-radius:50%; background:var(--accent-m); flex-shrink:0; }
.sb-count { margin-left:auto; font-size:11px; color:var(--text3); }

/* ─ Phase screens ─ */
.phase-screen { flex:1; display:none; flex-direction:column; overflow:hidden; }
.phase-screen.active { display:flex; }

/* ═══════════════════════════════
   PHASE 1 — TIMELINE
   ═══════════════════════════════ */
.compose-wrap { padding:.85rem 1.25rem .7rem; border-bottom:0.5px solid var(--border); flex-shrink:0; background:var(--bg3); }
.compose-inner { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r); overflow:hidden; }
.compose-inner:focus-within { border-color:var(--border2); }
.compose-ta { width:100%; min-height:64px; max-height:180px; padding:10px 13px 7px; background:transparent; border:none; outline:none; font-family:inherit; font-size:14px; color:var(--text); line-height:1.75; resize:none; overflow-y:auto; }
.compose-ta::placeholder { color:var(--text3); }
.compose-footer { display:flex; align-items:center; justify-content:space-between; padding:5px 10px; border-top:0.5px solid var(--border); }
.compose-hint { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:11px; color:var(--text3); }
.compose-hint span { color:var(--accent-d); }
.compose-btn { padding:4px 14px; background:var(--accent); color:#fff; border:none; border-radius:20px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px; font-weight:700; cursor:pointer; }
.compose-btn:hover { background:var(--accent-d); }

/* 選択バー */
.sel-bar {
  display:none; align-items:center; gap:8px;
  padding:7px 1.25rem;
  border-bottom:0.5px solid var(--border);
  background:var(--teal-l); flex-shrink:0;
}
.sel-bar.visible { display:flex; }
.sel-label { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px; color:var(--teal); }
.sel-action {
  padding:4px 12px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px;
  background:var(--teal); border:none; border-radius:20px; color:#fff; cursor:pointer;
}
.sel-action:hover { opacity:.85; }
.sel-clear { margin-left:auto; padding:4px 10px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:11px; background:none; border:0.5px solid var(--teal); border-radius:20px; color:var(--teal); cursor:pointer; }

/* フィード */
.feed { flex:1; overflow-y:auto; padding:.5rem 1.25rem 2rem; }
.post { padding:11px 0; border-bottom:0.5px solid var(--border); }
.post:hover { background:rgba(0,0,0,.015); }
.post.selected { background:rgba(42,122,88,.05); }
.post-row1 { display:flex; gap:10px; }
.post-sel { width:17px; flex-shrink:0; padding-top:3px; }
.post-sel-box { width:14px; height:14px; border:1.5px solid var(--border2); border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.post-sel-box:hover { border-color:var(--teal); }
.post-sel-box.checked { background:var(--teal); border-color:var(--teal); }
.post-sel-box.checked::after { content:'✓'; font-size:8px; color:#fff; font-weight:700; }
.post-body { flex:1; min-width:0; }
.post-text { font-size:14px; line-height:1.8; white-space:pre-wrap; word-break:break-word; color:var(--text); }
.post-text .tag { color:var(--accent); cursor:pointer; }
.post-text .tag:hover { text-decoration:underline; }
.post-meta { display:flex; align-items:center; gap:8px; margin-top:5px; flex-wrap:wrap; }
.post-time { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:11px; color:var(--text3); }
.post-actions { display:flex; gap:2px; margin-left:auto; opacity:0; transition:opacity .15s; }
.post:hover .post-actions { opacity:1; }
.pa { width:24px; height:24px; display:flex; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; font-size:12px; color:var(--text3); border-radius:var(--rsm); }
.pa:hover { background:var(--surface); color:var(--text); }
.pa.del:hover { background:var(--red-l); color:var(--red); }
.pa.star.on { color:var(--accent-m); }
/* 編集モード */
.post-edit-wrap { margin-top:6px; padding-left:27px; }
.post-edit-ta { width:100%; padding:8px 10px; background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--rsm); font-family:inherit; font-size:14px; color:var(--text); line-height:1.75; resize:none; outline:none; min-height:80px; }
.post-edit-ta:focus { border-color:var(--accent-m); }
.post-edit-actions { display:flex; gap:6px; margin-top:6px; }
.post-edit-btn { padding:4px 12px; border-radius:var(--rsm); border:none; cursor:pointer; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px; }
.post-edit-btn.save { background:var(--accent); color:#fff; }
.post-edit-btn.cancel { background:var(--surface); color:var(--text2); }
/* タグ */
.post-tags-row { display:flex; align-items:center; flex-wrap:wrap; gap:4px; margin-top:5px; padding-left:27px; }
.tag-pill { display:inline-flex; align-items:center; gap:3px; padding:1px 7px 1px 8px; background:var(--accent-l); border:0.5px solid var(--accent-m); border-radius:20px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--accent-d); cursor:pointer; }
.tag-pill:hover { background:var(--accent-m); color:#fff; }
.tag-pill-x { font-size:9px; color:var(--accent-d); cursor:pointer; line-height:1; padding:0 0 0 1px; background:none; border:none; }
.tag-pill:hover .tag-pill-x { color:#fff; }
.tag-add-btn { display:inline-flex; align-items:center; gap:2px; padding:1px 7px; background:none; border:0.5px dashed var(--border2); border-radius:20px; cursor:pointer; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); transition:all .1s; }
.tag-add-btn:hover { border-color:var(--accent-m); color:var(--accent); }
.tag-input-wrap { display:inline-flex; align-items:center; gap:3px; }
.tag-input { width:80px; padding:1px 6px; background:var(--bg3); border:0.5px solid var(--border2); border-radius:20px; outline:none; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text); }

/* ═══════════════════════════════
   PHASE 2 — OUTLINE BUILDER
   ═══════════════════════════════ */
.outline-builder { flex:1; display:flex; overflow:hidden; }

/* 左：全メモ一覧 */
.all-posts-panel {
  width:320px; flex-shrink:0;
  border-right:0.5px solid var(--border);
  display:flex; flex-direction:column;
  background:var(--bg);
}
.panel-hd {
  display:flex; align-items:center; gap:8px;
  padding:9px 12px;
  border-bottom:0.5px solid var(--border);
  font-family:'Hiragino Kaku Gothic ProN',sans-serif;
  font-size:11px; color:var(--text3);
  flex-shrink:0; background:var(--bg3);
}
.panel-hd-title { flex:1; }
.panel-search {
  flex:1; padding:5px 10px; background:var(--bg2);
  border:0.5px solid var(--border); border-radius:20px;
  font-size:11px; font-family:'Hiragino Kaku Gothic ProN',sans-serif;
  color:var(--text); outline:none;
}
.panel-search::placeholder { color:var(--text3); }
.panel-feed { flex:1; overflow-y:auto; padding:6px 8px 12px; }

/* メモカード（左パネル） */
.all-post-card {
  background:var(--bg2); border:0.5px solid var(--border);
  border-radius:var(--rsm); padding:8px 10px; margin-bottom:5px;
  cursor:pointer; transition:border-color .1s;
}
.all-post-card:hover { border-color:var(--border2); }
.all-post-card.in-outline { background:var(--accent-l); border-color:var(--accent-m); }
.all-post-text { font-size:12.5px; color:var(--text2); line-height:1.65; white-space:pre-wrap; word-break:break-word; }
.all-post-card.in-outline .all-post-text { color:var(--text); }
.all-post-foot { display:flex; align-items:center; gap:4px; margin-top:6px; }
.all-post-time { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); flex:1; }
.add-to-outline-btn { padding:2px 8px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; border-radius:20px; border:0.5px solid; cursor:pointer; background:none; transition:all .1s; }
.add-to-outline-btn.add { border-color:var(--accent-d); color:var(--accent-d); }
.add-to-outline-btn.add:hover { background:var(--accent); color:#fff; }
.add-to-outline-btn.remove { border-color:var(--border2); color:var(--text3); }
.add-to-outline-btn.remove:hover { background:var(--red-l); border-color:var(--red); color:var(--red); }

/* 右：アウトライン */
.outline-panel {
  flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg2);
}
.outline-toolbar {
  display:flex; align-items:center; gap:8px;
  padding:9px 14px;
  border-bottom:0.5px solid var(--border);
  flex-shrink:0; background:var(--bg3);
}
.outline-title-in {
  flex:1; background:var(--bg2); border:0.5px solid var(--border);
  border-radius:var(--rsm); padding:5px 10px;
  font-size:14px; font-weight:700; font-family:inherit; color:var(--text); outline:none;
}
.outline-title-in:focus { border-color:var(--border2); }
.outline-title-in::placeholder { color:var(--text3); font-weight:400; }
.go-note-btn {
  padding:5px 16px; background:var(--accent); color:#fff;
  border:none; border-radius:20px;
  font-family:'Hiragino Kaku Gothic ProN',sans-serif;
  font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0;
}
.go-note-btn:hover { background:var(--accent-d); }

.outline-feed {
  flex:1; overflow-y:auto; padding:8px 12px 2rem;
  /* インデントガイド帯 */
  background-image: linear-gradient(
    to right,
    transparent                    34px,
    rgba(122,92,30,.045)          34px,
    rgba(122,92,30,.045)          56px,
    rgba(122,92,30,.08)           56px,
    rgba(122,92,30,.08)           78px,
    rgba(122,92,30,.115)          78px,
    rgba(122,92,30,.115)         100px,
    rgba(122,92,30,.15)          100px
  );
  background-repeat:no-repeat; background-size:100% 100%;
}

/* アウトラインカード */
.outline-item { position:relative; margin-bottom:4px; }
.outline-item[data-level="0"] { margin-left:0; }
.outline-item[data-level="1"] { margin-left:var(--indent); }
.outline-item[data-level="2"] { margin-left:calc(var(--indent)*2); }
.outline-item[data-level="3"] { margin-left:calc(var(--indent)*3); }
.outline-item[data-level="4"] { margin-left:calc(var(--indent)*4); }
.out-card {
  background:var(--bg3); border:0.5px solid var(--border);
  border-radius:var(--rsm); transition:border-color .1s;
}
.out-card:hover { border-color:var(--border2); }
.out-card.drag-over-above { border-top:2px solid var(--teal); }
.out-card.drag-over-below { border-bottom:2px solid var(--teal); }
.out-card.dragging { opacity:.35; }
.out-card-body { display:flex; gap:4px; padding:7px 7px 0; }
.out-grip { color:var(--text3); font-size:12px; flex-shrink:0; cursor:grab; line-height:1.6; user-select:none; }
.out-text { flex:1; font-size:12.5px; color:var(--text2); line-height:1.65; white-space:pre-wrap; word-break:break-word; }
.out-level-btns { display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
.out-lv-btn { width:16px; height:16px; display:flex; align-items:center; justify-content:center; background:none; border:0.5px solid var(--border); border-radius:3px; font-size:8px; color:var(--text3); cursor:pointer; line-height:1; }
.out-lv-btn:hover { background:var(--surface); color:var(--text); }
.out-lv-btn:disabled { opacity:.2; cursor:default; }
.out-card-foot { display:flex; align-items:center; padding:4px 7px 5px; gap:3px; }
.out-time { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:9px; color:var(--text3); flex:1; opacity:.7; }
.out-remove { width:20px; height:20px; display:flex; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; font-size:10px; color:var(--text3); border-radius:3px; }
.out-remove:hover { background:var(--red-l); color:var(--red); }

.outline-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--text3); font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:13px; gap:8px; padding:2rem; text-align:center; }

/* ═══════════════════════════════
   PHASE 3 — NOTE EDITOR
   ═══════════════════════════════ */
.note-editor-wrap { flex:1; display:flex; overflow:hidden; }

/* ノートリスト */
.notes-list { width:175px; flex-shrink:0; border-right:0.5px solid var(--border); overflow-y:auto; background:var(--bg); }
.notes-list-hd { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-bottom:0.5px solid var(--border); font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:11px; color:var(--text3); position:sticky; top:0; background:var(--bg); z-index:1; }
.new-note-btn { padding:3px 9px; background:var(--accent-l); border:0.5px solid var(--accent-d); border-radius:20px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:11px; color:var(--accent); cursor:pointer; }
.new-note-btn:hover { background:var(--accent); color:#fff; }
.note-li { padding:9px 12px; cursor:pointer; border-bottom:0.5px solid var(--border); background:var(--bg); }
.note-li:hover { background:var(--surface); }
.note-li.active { background:var(--accent-l); }
.note-li-title { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.note-li-meta { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); margin-top:1px; }
.panel-toggle-btn { width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; font-size:11px; color:var(--text3); border-radius:3px; }
.panel-toggle-btn:hover { background:var(--surface); color:var(--text); }
.notes-list.collapsed { width:28px; min-width:28px; overflow:hidden; }
.notes-list.collapsed .notes-list-hd { padding:9px 4px; justify-content:center; }
.notes-list.collapsed .new-note-btn, .notes-list.collapsed #notesList, .notes-list.collapsed .notes-list-hd>span { display:none; }

/* エディターペイン */
.editor-pane { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; background:var(--bg3); }
.editor-toolbar { display:flex; align-items:center; gap:6px; padding:8px 14px; border-bottom:0.5px solid var(--border); flex-shrink:0; background:var(--bg3); }
.editor-title-in { flex:1; background:transparent; border:none; outline:none; font-size:15px; font-weight:700; font-family:inherit; color:var(--text); }
.editor-title-in::placeholder { color:var(--text3); }
.et-sep { width:0.5px; height:16px; background:var(--border); }
.et-btn { padding:4px 10px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:11px; border:0.5px solid var(--border); border-radius:var(--rsm); background:var(--bg3); color:var(--text2); cursor:pointer; }
.et-btn:hover { color:var(--text); border-color:var(--border2); }
.et-btn.primary { background:var(--teal-l); border-color:var(--teal); color:var(--teal); }
.et-btn.primary:hover { background:var(--teal); color:#fff; }
.et-btn.danger:hover { background:var(--red-l); border-color:var(--red); color:var(--red); }

/* 統計バー */
.editor-stats-bar { display:flex; align-items:center; gap:12px; padding:5px 14px; border-bottom:0.5px solid var(--border); background:var(--bg3); flex-shrink:0; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:11px; color:var(--text3); }
.stat-pill { display:flex; align-items:center; gap:4px; }
.stat-pill-val { color:var(--text2); font-variant-numeric:tabular-nums; }
.stat-line-in { width:44px; padding:1px 5px; background:var(--bg2); border:0.5px solid var(--border); border-radius:4px; font-size:11px; font-family:inherit; color:var(--text2); text-align:right; outline:none; }

.editor-split { flex:1; display:flex; overflow:hidden; }
.editor-main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; background:var(--bg2); }
.para-editor { flex:1; overflow-y:auto; padding:.75rem 0 3rem 0; background:var(--bg2); }
.para-row { position:relative; }
.para-input { display:block; width:100%; padding:3px 12px 3px 16px; background:transparent; border:none; outline:none; font-family:inherit; font-size:14px; color:var(--text); line-height:1.9; resize:none; overflow:hidden; transition:background .15s; caret-color:var(--accent); }
.para-input:focus { background:rgba(200,150,10,.09); }
.para-input.anchor-highlight { background:rgba(200,150,10,.18); transition:background .1s; }
.para-input.sticky-linked { background:rgba(200,150,10,.09); }
.para-add-sticky { display:none; position:absolute; right:8px; top:4px; padding:2px 8px; background:none; border:0.5px dashed var(--border2); border-radius:20px; cursor:pointer; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); transition:all .1s; }
.para-row:hover .para-add-sticky { display:block; }
.para-add-sticky:hover { border-color:var(--sticky-b); color:var(--accent-d); }
.para-add-btn { display:flex; align-items:center; justify-content:center; width:100%; padding:4px 0; background:none; border:none; cursor:pointer; color:var(--text3); font-size:11px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; opacity:0; transition:opacity .2s; }
.para-editor:hover .para-add-btn { opacity:.5; }
.para-add-btn:hover { opacity:1 !important; }
.editor-hint { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); padding:4px 14px 5px; border-top:0.5px solid var(--border); flex-shrink:0; background:var(--bg2); }

/* 付箋ペイン */
.sticky-pane-b { width:210px; flex-shrink:0; display:flex; flex-direction:column; border-left:0.5px solid var(--border); background:var(--surface); overflow:hidden; }
.sticky-pane-b-hd { display:flex; align-items:center; justify-content:space-between; padding:7px 10px; border-bottom:0.5px solid var(--border); font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); flex-shrink:0; background:var(--surface); }
.sticky-feed-b { flex:1; overflow-y:auto; position:relative; }
.sticky-card-b { position:absolute; left:8px; right:8px; background:var(--sticky); border:0.5px solid var(--sticky-b); border-radius:var(--rsm); transition:border-color .15s; }
.sticky-card-b:hover { border-color:var(--accent-d); }
.sticky-card-b.color-green { background:var(--sticky2); border-color:var(--sticky2-b); }
.sticky-card-b.is-active { outline:2px solid var(--accent-m); outline-offset:1px; background:var(--accent-l); }
.sticky-para-label { padding:4px 8px 2px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:9px; color:var(--text3); line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-bottom:0.5px solid rgba(0,0,0,.06); cursor:pointer; transition:background .1s; }
.sticky-para-label:hover { background:rgba(0,0,0,.04); }
.sticky-para-label.linked { color:var(--accent-d); }
.sticky-card-b-hd { display:flex; align-items:center; gap:3px; padding:3px 6px 2px; }
.sticky-color-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; cursor:pointer; border:none; }
.sticky-card-b:not(.color-green) .sticky-color-dot { background:var(--sticky-b); }
.sticky-card-b.color-green .sticky-color-dot { background:var(--sticky2-b); }
.sticky-del-b { width:14px; height:14px; display:flex; align-items:center; justify-content:center; background:none; border:none; font-size:9px; color:var(--text3); cursor:pointer; border-radius:3px; margin-left:auto; }
.sticky-del-b:hover { background:var(--red-l); color:var(--red); }
.sticky-ta-b { width:100%; padding:2px 8px 7px; background:transparent; border:none; outline:none; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:11px; color:var(--text2); line-height:1.6; resize:none; min-height:42px; max-height:200px; }
.sticky-ta-b::placeholder { color:rgba(90,84,70,.35); }
.sticky-unanchored-sep { position:absolute; left:8px; right:8px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:9px; color:var(--text3); padding:6px 4px 4px; border-top:0.5px dashed var(--border2); }

/* 段落ピッカー */
.anchor-picker-popup { position:fixed; z-index:300; background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--r); padding:6px; box-shadow:0 4px 20px rgba(0,0,0,.14); width:230px; max-height:260px; overflow-y:auto; }
.ap-pop-title { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); padding:2px 4px 6px; border-bottom:0.5px solid var(--border); margin-bottom:4px; }
.ap-pop-item { padding:5px 8px; font-size:11px; color:var(--text2); border-radius:var(--rsm); cursor:pointer; line-height:1.5; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.ap-pop-item:hover { background:var(--accent-l); color:var(--accent-d); }
.ap-pop-item.none-item { color:var(--text3); font-style:italic; }
.ap-pop-item.none-item:hover { background:var(--red-l); color:var(--red); }

/* empty / modal */
.note-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--text3); font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:13px; gap:8px; }
.empty-state { text-align:center; padding:2rem .5rem; font-family:'Hiragino Kaku Gothic ProN',sans-serif; color:var(--text3); font-size:12px; line-height:1.7; }
.empty-icon { font-size:22px; margin-bottom:6px; }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; align-items:center; justify-content:center; z-index:100; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--r); width:400px; max-width:95vw; padding:1.5rem; box-shadow:0 8px 32px rgba(0,0,0,.12); }
.modal-title { font-size:15px; font-weight:700; margin-bottom:1rem; }
.modal-label { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px; color:var(--text2); margin-bottom:5px; }
.modal-in { width:100%; padding:8px 10px; background:var(--bg3); border:0.5px solid var(--border); border-radius:var(--rsm); font-family:inherit; font-size:14px; color:var(--text); outline:none; margin-bottom:1rem; }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; }
.modal-btn { padding:6px 16px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:13px; font-weight:600; border-radius:var(--rsm); border:none; cursor:pointer; }
.modal-btn.cancel { background:var(--surface); color:var(--text2); }
.modal-btn.ok { background:var(--teal); color:#fff; }

/* ─ Thread replies ─ */
.thread-wrap { padding-left:27px; }
.thread-line-area { display:flex; gap:0; }
.thread-line { width:2px; background:var(--border2); border-radius:1px; flex-shrink:0; margin:0 11px 0 5px; }
.thread-replies { flex:1; min-width:0; }
.reply-post { padding:8px 0; border-bottom:0.5px solid var(--border); }
.reply-post:last-child { border-bottom:none; }
.reply-text { font-size:13.5px; line-height:1.8; white-space:pre-wrap; word-break:break-word; color:var(--text); }
.reply-meta { display:flex; align-items:center; gap:6px; margin-top:4px; }
.reply-time { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); }
.reply-del { background:none; border:none; cursor:pointer; font-size:10px; color:var(--text3); padding:2px 4px; border-radius:3px; opacity:0; }
.reply-post:hover .reply-del { opacity:1; }
.reply-del:hover { color:var(--red); }
/* 返信入力欄 */
.reply-compose { margin-top:4px; padding-left:27px; }
.reply-ta {
  width:100%; padding:7px 10px;
  background:var(--bg3); border:0.5px solid var(--border2);
  border-radius:var(--rsm); font-family:inherit; font-size:13.5px;
  color:var(--text); line-height:1.75; resize:none; outline:none;
  min-height:60px; max-height:160px;
}
.reply-ta:focus { border-color:var(--accent-m); background:var(--bg2); }
.reply-ta::placeholder { color:var(--text3); }
.reply-compose-foot { display:flex; gap:6px; justify-content:flex-end; margin-top:6px; }
.reply-btn { padding:4px 14px; background:var(--accent); color:#fff; border:none; border-radius:20px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px; cursor:pointer; }
.reply-btn:hover { background:var(--accent-d); }
.reply-cancel { padding:4px 10px; background:var(--surface); color:var(--text2); border:none; border-radius:20px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px; cursor:pointer; }
/* スレッドバッジ */
.thread-badge { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); margin-left:6px; }

@media (max-width:640px) {
  .thread-line { margin:0 8px 0 4px; }
  .reply-text { font-size:15px; }
}
@media (max-width: 640px) {
  body { font-size:16px; }

  /* トップバー：アプリ名 ＋ フェーズボタンのみ */
  .topbar { padding:0 .75rem; height:52px; }
  .app-name { font-size:14px; margin-right:.75rem; }
  .phase-step { padding:5px 10px; font-size:12px; gap:5px; }
  .phase-step .phase-num { width:16px; height:16px; font-size:9px; }
  .phase-arrow { margin:0 2px; }
  .topbar-right { display:none; } /* 検索はモバイルでは非表示 */

  /* サイドバー非表示 */
  .tag-sidebar { display:none !important; }

  /* Phase 2,3 はモバイルでは警告表示 */
  #phase2.active .outline-builder,
  #phase3.active .note-editor-wrap { display:none; }
  .mobile-phase-msg { display:flex !important; }

  /* フィード */
  .feed { padding:.5rem .75rem 5rem; }

  /* 投稿 */
  .post { padding:13px 0; }
  .post-actions { opacity:1 !important; } /* 常時表示（ホバーなし） */
  .pa { width:32px; height:32px; font-size:14px; }

  /* コンポーズ */
  .compose-wrap { padding:.75rem .75rem .6rem; }
  .compose-ta { font-size:16px; min-height:72px; }
  .compose-hint { display:none; }
  .compose-btn { padding:7px 20px; font-size:14px; }
  .compose-footer { padding:7px 10px; }

  /* 選択バー */
  .sel-bar { padding:8px .75rem; }
  .sel-label { font-size:13px; }
  .sel-action { padding:6px 14px; font-size:13px; }

  /* タグ */
  .post-tags-row { padding-left:0; margin-top:8px; gap:6px; }
  .tag-pill { padding:3px 10px 3px 11px; font-size:11px; }
  .tag-add-btn { padding:3px 10px; font-size:11px; }

  /* 検索 → モバイル検索バー */
  .mobile-search-bar { display:flex !important; }

  /* 編集 */
  .post-edit-ta { font-size:16px; }
  .post-edit-btn { padding:8px 16px; font-size:13px; }
}

/* モバイル専用要素（デフォルト非表示） */
.mobile-phase-msg {
  display:none;
  flex-direction:column; align-items:center; justify-content:center;
  flex:1; gap:12px; padding:2rem 1.5rem; text-align:center;
  font-family:'Hiragino Kaku Gothic ProN',sans-serif;
  color:var(--text3); font-size:13px;
}
.mobile-phase-msg .msg-icon { font-size:28px; margin-bottom:4px; }
.mobile-search-bar {
  display:none;
  padding:8px .75rem;
  border-bottom:0.5px solid var(--border);
  background:var(--bg3); flex-shrink:0;
}
.mobile-search-in {
  width:100%; padding:8px 14px;
  background:var(--bg2); border:0.5px solid var(--border);
  border-radius:20px; font-size:15px; outline:none;
  font-family:'Hiragino Kaku Gothic ProN',sans-serif; color:var(--text);
}
.mobile-search-in::placeholder { color:var(--text3); }

/* ═══ LOGIN OVERLAY ═══ */
.login-overlay {
  position:fixed; inset:0; z-index:9999;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
}
.login-box {
  background:var(--bg2); border:0.5px solid var(--border2);
  border-radius:var(--r); padding:2.5rem 2rem;
  width:360px; max-width:92vw;
  box-shadow:0 8px 32px rgba(0,0,0,.10);
  display:flex; flex-direction:column; gap:16px;
}
.login-title { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:20px; font-weight:700; color:var(--accent); }
.login-sub { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px; color:var(--text3); line-height:1.7; margin-top:-6px; }
.login-input { width:100%; padding:10px 12px; border:0.5px solid var(--border2); border-radius:var(--rsm); font-size:15px; font-family:inherit; color:var(--text); background:var(--bg3); outline:none; }
.login-input:focus { border-color:var(--accent-m); background:var(--bg2); }
.login-btn { width:100%; padding:11px; background:var(--accent); color:#fff; border:none; border-radius:var(--rsm); font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:14px; font-weight:700; cursor:pointer; }
.login-btn:hover { background:var(--accent-d); }
.login-btn:disabled { opacity:.5; cursor:default; }
.login-msg { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:12px; line-height:1.7; text-align:center; min-height:1em; }
.login-msg.ok { color:var(--teal); }
.login-msg.err { color:var(--red); }
.user-badge { font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:11px; color:var(--text3); display:flex; align-items:center; gap:6px; }
.logout-btn { padding:2px 8px; background:none; border:0.5px solid var(--border2); border-radius:20px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; font-size:10px; color:var(--text3); cursor:pointer; }
.logout-btn:hover { border-color:var(--red); color:var(--red); }
.sync-dot { width:6px; height:6px; border-radius:50%; background:var(--border2); flex-shrink:0; transition:background .3s; }
.sync-dot.syncing { background:var(--accent-m); }
.sync-dot.saved { background:var(--teal); }
</style>
</head>
<body>

<!-- ログインオーバーレイ -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-title">ThinkNotes</div>
    <div class="login-sub">メールアドレスを入力してください。<br>ログイン用のリンクをお送りします。</div>
    <input class="login-input" type="email" id="loginEmail" placeholder="メールアドレス"
      onkeydown="if(event.key==='Enter')sendMagicLink()">
    <button class="login-btn" id="loginBtn" onclick="sendMagicLink()">ログインリンクを送る</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="app-name">ThinkNotes</div>
  <div class="phase-steps">
    <button class="phase-step active" id="ps-1" onclick="switchPhase(1)">
      <span class="phase-num">1</span>タイムライン
    </button>
    <span class="phase-arrow">→</span>
    <button class="phase-step" id="ps-2" onclick="switchPhase(2)">
      <span class="phase-num">2</span>アウトライン
    </button>
    <span class="phase-arrow">→</span>
    <button class="phase-step" id="ps-3" onclick="switchPhase(3)">
      <span class="phase-num">3</span>ノート
    </button>
  </div>
  <div class="topbar-right">
    <div class="sync-dot" id="syncDot" title="保存状態"></div>
    <div class="user-badge" id="userBadge" style="display:none">
      <span id="userEmail" style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <button class="logout-btn" onclick="signOut()">ログアウト</button>
    </div>
    <div class="search-wrap" id="searchWrap">
      <span class="search-icon">🔍</span>
      <input class="search-in" id="searchIn" placeholder="検索…" oninput="onSearch(this.value)">
    </div>
  </div>
</div>

<div class="main">

  <!-- タグサイドバー（フェーズ1のみ） -->
  <div class="tag-sidebar" id="tagSidebar">
    <div class="sb-section">
      <div class="sb-head">フィルター</div>
      <div class="sb-item active" id="filter-all" onclick="setFilter('all')"><span>すべて</span><span class="sb-count" id="cnt-all">0</span></div>
      <div class="sb-item" id="filter-starred" onclick="setFilter('starred')"><span>⭐ スター</span><span class="sb-count" id="cnt-starred">0</span></div>
    </div>
    <div class="sb-section">
      <div class="sb-head">タグ</div>
      <div id="sbTagList"></div>
    </div>
  </div>

  <!-- ═══ PHASE 1 ═══ -->
  <div class="phase-screen active" id="phase1">
    <!-- モバイル用検索バー -->
    <div class="mobile-search-bar" id="mobileSearchBar">
      <input class="mobile-search-in" placeholder="検索…" oninput="onSearch(this.value)">
    </div>
    <div class="compose-wrap">
      <div class="compose-inner">
        <textarea class="compose-ta" id="composeTA" placeholder="思考の断片を書き流す…" onkeydown="onComposeKey(event)"></textarea>
        <div class="compose-footer">
          <div class="compose-hint">Ctrl+Enter で投稿　<span>#タグ</span> は後から追加・削除できます</div>
          <button class="compose-btn" onclick="submitPost()">投稿</button>
        </div>
      </div>
    </div>
    <!-- 選択バー -->
    <div class="sel-bar" id="selBar">
      <span class="sel-label" id="selLabel">0件選択中</span>
      <button class="sel-action" onclick="goToOutlineWithSel()">アウトラインに追加 →</button>
      <button class="sel-clear" onclick="clearSel()">解除</button>
    </div>
    <div class="feed" id="feed"></div>
  </div>

  <!-- ═══ PHASE 2 ═══ -->
  <div class="phase-screen" id="phase2">
    <div class="mobile-phase-msg">
      <div class="msg-icon">🖥️</div>
      <div>アウトライン機能はPC画面でご利用ください</div>
    </div>
    <div class="outline-builder">
      <!-- 左：メモ一覧 + 新規投稿 -->
      <div class="all-posts-panel">
        <div class="panel-hd" style="flex-direction:column;gap:6px;padding:8px 10px;">
          <input class="panel-search" id="outlineSearch" placeholder="キーワードで検索…" oninput="renderAllPostsPanel()">
          <!-- タグフィルター -->
          <div id="outlineTagFilters" style="display:flex;flex-wrap:wrap;gap:4px;"></div>
          <!-- アウトライン内でつぶやきを追加 -->
          <div style="display:flex;gap:6px;align-items:flex-end;">
            <textarea id="outlineComposeTA" placeholder="新しいつぶやきを追加してアウトラインに…" rows="4"
              style="flex:1;resize:vertical;padding:8px 10px;font-family:inherit;font-size:13px;border:0.5px solid var(--border);border-radius:var(--rsm);outline:none;background:var(--bg2);color:var(--text);line-height:1.7;min-height:80px;max-height:240px;"
              onkeydown="onOutlineComposeKey(event)"></textarea>
            <button onclick="submitOutlinePost()" style="padding:5px 10px;background:var(--accent);color:#fff;border:none;border-radius:var(--rsm);font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:11px;cursor:pointer;flex-shrink:0;">投稿</button>
          </div>
        </div>
        <div class="panel-feed" id="allPostsFeed"></div>
      </div>
      <!-- 右：アウトライン -->
      <div class="outline-panel">
        <div class="outline-toolbar">
          <input class="outline-title-in" id="outlineTitleIn" placeholder="アウトラインのタイトル…" value="">
          <button onclick="newOutline()" style="padding:4px 10px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rsm);font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:11px;color:var(--text2);cursor:pointer;flex-shrink:0;" title="新規アウトライン">新規</button>
          <button onclick="saveOutline()" style="padding:4px 10px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rsm);font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:11px;color:var(--text2);cursor:pointer;flex-shrink:0;" title="アウトラインを保存">保存</button>
          <button class="go-note-btn" onclick="goToNote()">ノートを書く →</button>
        </div>
        <!-- 保存済みアウトライン一覧 -->
        <div id="savedOutlinesBar" style="display:none;border-bottom:0.5px solid var(--border);background:var(--bg3);flex-shrink:0;max-height:200px;overflow-y:auto;">
          <div style="font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:10px;color:var(--text3);padding:6px 10px 4px;letter-spacing:.05em;">保存済みアウトライン</div>
          <div id="savedOutlinesList"></div>
        </div>
        <div class="outline-feed" id="outlineFeed"></div>
      </div>
    </div>
  </div>

  <!-- ═══ PHASE 3 ═══ -->
  <div class="phase-screen" id="phase3">
    <div class="mobile-phase-msg">
      <div class="msg-icon">🖥️</div>
      <div>ノートエディター機能はPC画面でご利用ください</div>
    </div>
    <div class="note-editor-wrap">
      <!-- ノートリスト -->
      <div class="notes-list" id="notesListPanel">
        <div class="notes-list-hd">
          <span>ノート</span>
          <button class="new-note-btn" onclick="createBlankNote()">＋</button>
          <button class="panel-toggle-btn" onclick="toggleNotesList()" title="折りたたむ">◀</button>
        </div>
        <div id="notesList"></div>
      </div>
      <!-- エディター -->
      <div class="editor-pane">
        <div class="note-empty" id="editorEmpty">
          <div class="empty-icon">✦</div>
          <div>ノートを選択するか<br>「＋」で新規作成</div>
        </div>
        <div id="editorActive" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
          <div class="editor-toolbar">
            <input class="editor-title-in" id="editorTitle" placeholder="タイトル" oninput="saveNoteTitle()">
            <div class="et-sep"></div>
            <div style="position:relative;">
              <button class="et-btn" onclick="toggleOutlineLoadMenu()" id="outlineLoadBtn" title="アウトラインを読み込む">アウトライン ▾</button>

async function loadFromSupabase(){
  if(!currentUser)return;
  setSyncDot('syncing');
  const {data,error}=await sb.from('thinkdata')
    .select('data_key,data_value').eq('user_id',currentUser.id);
  if(error){console.error('load error',error);loadLocal();setSyncDot('');return;}
  const map={};(data||[]).forEach(r=>{map[r.data_key]=r.data_value;});
  posts=map.posts||JSON.parse(localStorage.getItem(KP)||'[]');
  notes=map.notes||JSON.parse(localStorage.getItem(KN)||'[]');
  outlines=map.outlines||JSON.parse(localStorage.getItem(KO)||'[]');
  // migrate
  notes.forEach(n=>{
    if(!n.items)n.items=[];if(!n.stickies)n.stickies=[];
    if(!n.paragraphs)n.paragraphs=n.body?n.body.split('\n').filter(l=>l.trim()):[];
  });
  if(!posts.length)posts=DEMO_POSTS;
  if(!notes.length)notes=DEMO_NOTES;
  // cache locally
  localStorage.setItem(KP,JSON.stringify(posts));
  localStorage.setItem(KN,JSON.stringify(notes));
  localStorage.setItem(KO,JSON.stringify(outlines));
  setSyncDot('saved');
  renderSidebar();renderFeed();
}

async function saveToSupabase(){
  if(!currentUser)return;
  setSyncDot('syncing');
  const uid=currentUser.id;
  const ts=new Date().toISOString();
  const {error}=await Promise.all([
    sb.from('thinkdata').upsert({user_id:uid,data_key:'posts',data_value:posts,updated_at:ts},{onConflict:'user_id,data_key'}),
    sb.from('thinkdata').upsert({user_id:uid,data_key:'notes',data_value:notes,updated_at:ts},{onConflict:'user_id,data_key'}),
    sb.from('thinkdata').upsert({user_id:uid,data_key:'outlines',data_value:outlines,updated_at:ts},{onConflict:'user_id,data_key'}),
  ]).then(results=>{return results.find(r=>r.error)||{};});
  setSyncDot(error?'':'saved');
  if(error)console.error('save error',error);
}

function setSyncDot(state){
  const dot=document.getElementById('syncDot');
  if(!dot)return;
  dot.className='sync-dot'+(state?' '+state:'');
  dot.title=state==='syncing'?'同期中…':state==='saved'?'保存済み':'';
  if(state==='saved')setTimeout(()=>{if(dot.classList.contains('saved'))dot.className='sync-dot';},2000);
}

function loadLocal(){
  try{posts=JSON.parse(localStorage.getItem(KP)||'[]');}catch(e){posts=[];}
  try{notes=JSON.parse(localStorage.getItem(KN)||'[]');}catch(e){notes=[];}
  try{outlines=JSON.parse(localStorage.getItem(KO)||'[]');}catch(e){outlines=[];}
  notes.forEach(n=>{
    if(!n.items)n.items=[];if(!n.stickies)n.stickies=[];
    if(!n.paragraphs)n.paragraphs=n.body?n.body.split('\n').filter(l=>l.trim()):[];
  });
  if(!posts.length)posts=DEMO_POSTS;
  if(!notes.length)notes=DEMO_NOTES;
}
// ─── State ────────────────────────────────────────────────
const KP='tn_posts_v20', KN='tn_notes_v20', KO='tn_outlines_v20';
let posts=[], notes=[], outlines=[];
let currentPhase=1;
let currentFilter='all', currentTag=null, searchQuery='';
let selectedIds=new Set();
let currentNoteId=null;
let currentOutline=[];   // [{id,level}]
let currentOutlineId=null;
let saveTimer=null;
const MAX_LEVEL=4;
// outline drag
let outDragIdx=null;
// sticky
let _syncScrolling=false;
let _pickerStickyId=null;
// post edit
let editingPostId=null, editingTagPostId=null, replyingToId=null;

// ─── Persist (local fallback) ─────────────────────────────
function load(){loadLocal();}
function save(){
  // ローカルに即時保存
  localStorage.setItem(KP,JSON.stringify(posts));
  localStorage.setItem(KN,JSON.stringify(notes));
  localStorage.setItem(KO,JSON.stringify(outlines));
  // Supabaseにデバウンス保存
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveToSupabase,1500);
}

// ─── Helpers ─────────────────────────────────────────────
function extractTags(t){return[...new Set((t.match(/#[^\s#、。！？,.!?]+/g)||[]).map(x=>x.slice(1)))]}
function allTagsMap(){const m={};posts.forEach(p=>extractTags(p.content).forEach(t=>{m[t]=(m[t]||0)+1;}));return m;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function pad(n){return String(n).padStart(2,'0');}
function fmtDate(ts){const d=new Date(ts);return`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;}
function fmtDateISO(ts){return new Date(ts).toISOString().slice(0,10);}
function fmtDt(ts){const d=new Date(ts);return`${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}
function truncate(s,len){if(!s)return'';return s.length<=len?s:s.slice(0,len)+'…';}
function cleanText(content){
  return content.split('\n').map(l=>l.replace(/^│\s?/,'')).join('\n')
    .replace(/#[^\s#、。！？,.!?]+/g,'').replace(/[ \t]+\n/g,'\n').trim();
}

// ─── Phase switching ─────────────────────────────────────
function switchPhase(n){
  currentPhase=n;
  [1,2,3].forEach(i=>{
    document.getElementById('ps-'+i).classList.toggle('active',i===n);
    document.getElementById('phase'+i).classList.toggle('active',i===n);
  });
  document.getElementById('tagSidebar').style.display=n===1?'':'none';
  document.getElementById('searchWrap').style.display=n===1?'':'none';
  if(n===1)renderFeed();
  if(n===2){renderOutlineTagFilters();renderAllPostsPanel();renderOutlineFeed();renderSavedOutlinesBar();}
  if(n===3){renderNotesList();}
}

// ─── Sidebar & Filter ────────────────────────────────────
function renderSidebar(){
  const tags=allTagsMap();
  document.getElementById('cnt-all').textContent=posts.length;
  document.getElementById('cnt-starred').textContent=posts.filter(p=>p.starred).length;
  document.getElementById('sbTagList').innerHTML=Object.entries(tags).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`
    <div class="sb-item" id="sbtag-${t}" onclick="setFilter('tag','${esc(t)}')">
      <div class="sb-tag-dot"></div><span>#${esc(t)}</span><span class="sb-count">${n}</span>
    </div>`).join('');
}
function setFilter(f,tag){
  currentFilter=f;currentTag=tag||null;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  if(!tag)document.getElementById('filter-'+f)?.classList.add('active');
  if(tag)document.getElementById('sbtag-'+tag)?.classList.add('active');
  renderFeed();
}
function onSearch(q){searchQuery=q;renderFeed();}

// ─── Phase 1: Feed ───────────────────────────────────────
function filteredPosts(){
  let r=[...posts];
  if(searchQuery){const q=searchQuery.toLowerCase();r=r.filter(p=>p.content.toLowerCase().includes(q));}
  if(currentFilter==='starred')r=r.filter(p=>p.starred);
  if(currentTag)r=r.filter(p=>extractTags(p.content).includes(currentTag));
  return r.sort((a,b)=>b.createdAt-a.createdAt);
}
function renderFeed(){
  const fp=filteredPosts();
  const feed=document.getElementById('feed');
  if(!fp.length){feed.innerHTML=`<div class="empty-state"><div class="empty-icon">✦</div>投稿がありません</div>`;return;}
  feed.innerHTML=fp.map(p=>renderPost(p)).join('');
  updateSelBar();
}
function renderPost(p){
  const tags=extractTags(p.content);
  const isEditing=editingPostId===p.id;
  const isReplying=replyingToId===p.id;
  const displayText=p.content.replace(/#[^\s#、。！？,.!?]+/g,'').replace(/\n{3,}/g,'\n\n').trimEnd();
  const sel=selectedIds.has(p.id);
  const replies=p.replies||[];
  const tagPills=tags.map(t=>`
    <span class="tag-pill" onclick="setFilter('tag','${esc(t)}')">#${esc(t)}
      <button class="tag-pill-x" onclick="event.stopPropagation();removeTag('${p.id}','${esc(t)}')">✕</button>
    </span>`).join('');
  const isEditingTag=editingTagPostId===p.id;

  // スレッド部分（返信）
  const threadHtml=replies.length?`
    <div class="thread-wrap">
      <div class="thread-line-area">
        <div class="thread-line"></div>
        <div class="thread-replies">
          ${replies.map((r,ri)=>`
            <div class="reply-post" id="reply-${p.id}-${ri}">
              <div class="reply-text">${esc(r.content)}</div>
              <div class="reply-meta">
                <span class="reply-time">${fmtDt(r.createdAt)}</span>
                <button class="reply-del" onclick="deleteReply('${p.id}',${ri})">✕</button>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`:'';

  // 返信入力欄
  const replyComposeHtml=isReplying?`
    <div class="reply-compose">
      <textarea class="reply-ta" id="reply-ta-${p.id}" placeholder="返信を入力… (Ctrl+Enter で投稿)"
        onkeydown="onReplyKey(event,'${p.id}')"></textarea>
      <div class="reply-compose-foot">
        <button class="reply-cancel" onclick="cancelReply()">キャンセル</button>
        <button class="reply-btn" onclick="submitReply('${p.id}')">返信</button>
      </div>
    </div>`:'';

  return`<div class="post ${sel?'selected':''}" id="post-${p.id}">
    <div class="post-row1">
      <div class="post-sel"><div class="post-sel-box ${sel?'checked':''}" onclick="toggleSel('${p.id}')"></div></div>
      <div class="post-body">
        ${isEditing?'':`<div class="post-text">${displayText||'（空）'}</div>`}
        <div class="post-meta">
          <span class="post-time">${fmtDt(p.createdAt)}</span>
          ${replies.length?`<span class="thread-badge">↩ ${replies.length}件</span>`:''}
          <div class="post-actions">
            <button class="pa" title="返信" onclick="startReply('${p.id}')">↩</button>
            <button class="pa" title="編集" onclick="startPostEdit('${p.id}')">✎</button>
            <button class="pa star ${p.starred?'on':''}" onclick="toggleStar('${p.id}')">★</button>
            <button class="pa del" onclick="deletePost('${p.id}')">✕</button>
          </div>
        </div>
      </div>
    </div>
    ${isEditing?`<div class="post-edit-wrap">
      <textarea class="post-edit-ta" id="edit-ta-${p.id}">${esc(p.content)}</textarea>
      <div class="post-edit-actions">
        <button class="post-edit-btn save" onclick="savePostEdit('${p.id}')">保存</button>
        <button class="post-edit-btn cancel" onclick="cancelPostEdit()">キャンセル</button>
      </div></div>`:''}
    <div class="post-tags-row">
      ${tagPills}
      ${isEditingTag
        ?`<span class="tag-input-wrap"><input class="tag-input" id="taginput-${p.id}" placeholder="タグ名" maxlength="20" onkeydown="onTagInputKey(event,'${p.id}')" onblur="cancelTagEdit('${p.id}')"></span>`
        :`<button class="tag-add-btn" onclick="startTagEdit('${p.id}')">＋ タグ</button>`}
    </div>
    ${threadHtml}
    ${replyComposeHtml}
  </div>`;
}

// Post CRUD
function submitPost(){
  const ta=document.getElementById('composeTA');const text=ta.value.trim();if(!text)return;
  posts.push({id:uid(),content:text,createdAt:Date.now(),starred:false,replies:[]});
  ta.value='';ta.style.height='';save();renderFeed();renderSidebar();
}

// ─── Reply (thread) ──────────────────────────────────────
function startReply(pid){
  replyingToId=pid;editingPostId=null;editingTagPostId=null;
  renderFeed();
  setTimeout(()=>{const ta=document.getElementById('reply-ta-'+pid);if(ta){ta.focus();}},30);
}
function cancelReply(){replyingToId=null;renderFeed();}
function submitReply(pid){
  const ta=document.getElementById('reply-ta-'+pid);if(!ta)return;
  const text=ta.value.trim();if(!text)return;
  const p=posts.find(x=>x.id===pid);if(!p)return;
  if(!p.replies)p.replies=[];
  p.replies.push({id:uid(),content:text,createdAt:Date.now()});
  replyingToId=null;save();renderFeed();
}
function deleteReply(pid,idx){
  const p=posts.find(x=>x.id===pid);if(!p||!p.replies)return;
  p.replies.splice(idx,1);save();renderFeed();
}
function onReplyKey(e,pid){
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();submitReply(pid);}
  setTimeout(()=>{const t=e.target;t.style.height='auto';t.style.height=Math.min(160,t.scrollHeight)+'px';},0);
}
function deletePost(id){if(!confirm('削除しますか？'))return;posts=posts.filter(p=>p.id!==id);selectedIds.delete(id);save();renderFeed();renderSidebar();}
function toggleStar(id){const p=posts.find(x=>x.id===id);if(p){p.starred=!p.starred;save();renderFeed();renderSidebar();}}
function toggleSel(id){if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);renderFeed();}
function clearSel(){selectedIds.clear();renderFeed();}
function updateSelBar(){
  const n=selectedIds.size;
  const bar=document.getElementById('selBar');
  bar.classList.toggle('visible',n>0);
  document.getElementById('selLabel').textContent=n+'件選択中';
}
function startPostEdit(pid){editingPostId=pid;editingTagPostId=null;renderFeed();setTimeout(()=>{const ta=document.getElementById('edit-ta-'+pid);if(!ta)return;ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);},30);}
function savePostEdit(pid){const ta=document.getElementById('edit-ta-'+pid);if(!ta)return;const p=posts.find(x=>x.id===pid);if(!p)return;p.content=ta.value;editingPostId=null;save();renderFeed();renderSidebar();}
function cancelPostEdit(){editingPostId=null;renderFeed();}
function startTagEdit(pid){editingTagPostId=pid;renderFeed();setTimeout(()=>{const el=document.getElementById('taginput-'+pid);if(el)el.focus();},30);}
function cancelTagEdit(pid){if(editingTagPostId===pid){editingTagPostId=null;renderFeed();}}
function onTagInputKey(e,pid){
  if(e.key==='Enter'||e.key===','){e.preventDefault();const val=e.target.value.trim().replace(/^#/,'').replace(/\s+/g,'');if(val)addTag(pid,val);editingTagPostId=null;renderFeed();renderSidebar();}
  if(e.key==='Escape'){editingTagPostId=null;renderFeed();}
}
function addTag(pid,tag){const p=posts.find(x=>x.id===pid);if(!p||extractTags(p.content).includes(tag))return;p.content=(p.content.trimEnd()+'\n\n#'+tag).replace(/\n{3,}/g,'\n\n');save();}
function removeTag(pid,tag){const p=posts.find(x=>x.id===pid);if(!p)return;p.content=p.content.replace(new RegExp('#'+tag+'(?=[\\s#、。！？,.!?]|$)','g'),'').replace(/\n{3,}/g,'\n\n').trimEnd();save();renderFeed();renderSidebar();}

// ─── Phase 2: Outline Builder ────────────────────────────
let outlineActiveTag=null;

function renderOutlineTagFilters(){
  const el=document.getElementById('outlineTagFilters');if(!el)return;
  const tags=allTagsMap();
  if(!Object.keys(tags).length){el.innerHTML='';return;}
  el.innerHTML=Object.entries(tags).sort((a,b)=>b[1]-a[1]).map(([t])=>`
    <span onclick="toggleOutlineTag('${esc(t)}')"
      style="display:inline-block;padding:1px 8px;border-radius:20px;cursor:pointer;font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:10px;
        background:${outlineActiveTag===t?'var(--accent)':'var(--accent-l)'};
        color:${outlineActiveTag===t?'#fff':'var(--accent-d)'};
        border:0.5px solid ${outlineActiveTag===t?'var(--accent)':'var(--accent-m)'};">
      #${esc(t)}
    </span>`).join('');
}
function toggleOutlineTag(tag){
  outlineActiveTag=outlineActiveTag===tag?null:tag;
  renderOutlineTagFilters();renderAllPostsPanel();
}

function newOutline(){
  if(currentOutline.length&&!confirm('現在のアウトラインをクリアして新規作成しますか？'))return;
  currentOutline=[];currentOutlineId=null;
  document.getElementById('outlineTitleIn').value='';
  renderAllPostsPanel();renderOutlineFeed();renderSavedOutlinesBar();
}

function goToOutlineWithSel(){
  // 選択中の投稿をアウトラインに追加（連ツイは構造ごと）
  selectedIds.forEach(id=>{
    if(!currentOutline.find(it=>it.id===id)){
      addThreadToOutline(id,0);
    }
  });
  selectedIds.clear();
  switchPhase(2);
}

// 投稿（＋連ツイ）をアウトラインに追加するヘルパー
function addThreadToOutline(pid,baseLevel){
  const p=posts.find(x=>x.id===pid);if(!p)return;
  currentOutline.push({id:pid,level:baseLevel});
  (p.replies||[]).forEach(r=>{
    // 返信はreplyIdとして仮想postとして扱う（id='reply:親id:index'）
    if(!currentOutline.find(it=>it.id==='reply:'+pid+':'+p.replies.indexOf(r))){
      currentOutline.push({id:'reply:'+pid+':'+p.replies.indexOf(r),level:baseLevel+1,_replyContent:r.content,_replyCreatedAt:r.createdAt});
    }
  });
}

// アウトライン内で新規投稿
function submitOutlinePost(){
  const ta=document.getElementById('outlineComposeTA');
  const text=ta.value.trim();if(!text)return;
  const p={id:uid(),content:text,createdAt:Date.now(),starred:false};
  posts.push(p);
  currentOutline.push({id:p.id,level:0});
  ta.value='';ta.style.height='';
  save();renderSidebar();renderAllPostsPanel();renderOutlineFeed();
}
function onOutlineComposeKey(e){
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();submitOutlinePost();}
  setTimeout(()=>{const t=e.target;t.style.height='auto';t.style.height=Math.min(120,t.scrollHeight)+'px';},0);
}

function renderAllPostsPanel(){
  const feed=document.getElementById('allPostsFeed');
  const q=(document.getElementById('outlineSearch')?.value||'').toLowerCase();
  let pool=[...posts].sort((a,b)=>b.createdAt-a.createdAt);
  if(q)pool=pool.filter(p=>p.content.toLowerCase().includes(q));
  if(outlineActiveTag)pool=pool.filter(p=>extractTags(p.content).includes(outlineActiveTag));
  const outIds=new Set(currentOutline.map(it=>it.id));
  if(!pool.length){feed.innerHTML=`<div class="empty-state"><div class="empty-icon">✦</div>メモがありません</div>`;return;}
  feed.innerHTML=pool.map(p=>{
    const inOut=outIds.has(p.id);
    const replyCount=(p.replies||[]).length;
    return`<div class="all-post-card ${inOut?'in-outline':''}">
      <div class="all-post-text">${esc(cleanText(p.content))}</div>
      ${replyCount?`<div style="font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:10px;color:var(--text3);margin-top:4px;">↩ 連ツイ ${replyCount}件</div>`:''}
      <div class="all-post-foot">
        <span class="all-post-time">${fmtDt(p.createdAt)}</span>
        <button class="add-to-outline-btn ${inOut?'remove':'add'}"
          onclick="${inOut?`removeFromOutline('${p.id}')`:`addToOutline('${p.id}')`}">
          ${inOut?'✕ 外す':replyCount?`＋ 追加（連ツイ込み）`:'＋ 追加'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function addToOutline(pid){
  if(!currentOutline.find(it=>it.id===pid)){
    addThreadToOutline(pid,0);
  }
  renderAllPostsPanel();renderOutlineFeed();
}
function removeFromOutline(pid){
  // 元投稿と、それに紐づく返信アイテムも一括削除
  currentOutline=currentOutline.filter(it=>it.id!==pid&&!it.id.startsWith('reply:'+pid+':'));
  renderAllPostsPanel();renderOutlineFeed();
}

// バグ修正版：outlineEmpty を innerHTML で消さない
function renderOutlineFeed(){
  const feed=document.getElementById('outlineFeed');if(!feed)return;
  feed.innerHTML=''; // clear all including any stale content
  if(!currentOutline.length){
    feed.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;color:var(--text3);font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:13px;gap:8px;text-align:center"><div style="font-size:22px;margin-bottom:4px">✦</div>左のメモを追加するか<br>タイムラインで選択してください</div>`;
    return;

// アウトライン保存・読み込み
function saveOutline(){
  const title=document.getElementById('outlineTitleIn').value.trim();
  if(!title){alert('タイトルを入力してください');return;}
  if(!currentOutline.length){alert('アウトラインが空です');return;}
  if(currentOutlineId){
    // 上書き
    const ol=outlines.find(x=>x.id===currentOutlineId);
    if(ol){ol.title=title;ol.items=[...currentOutline];ol.updatedAt=Date.now();}
  } else {
    // 新規
    currentOutlineId=uid();
    outlines.push({id:currentOutlineId,title,items:[...currentOutline],createdAt:Date.now(),updatedAt:Date.now()});
  }
  save();renderSavedOutlinesBar();
}

function renderSavedOutlinesBar(){
  const bar=document.getElementById('savedOutlinesBar');
  const list=document.getElementById('savedOutlinesList');
  if(!bar||!list)return;
  if(!outlines.length){bar.style.display='none';return;}
  bar.style.display='';
  list.innerHTML=outlines.sort((a,b)=>b.updatedAt-a.updatedAt).map(ol=>{
    const active=ol.id===currentOutlineId;
    return`<div onclick="loadOutline('${ol.id}')"
      style="display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-bottom:0.5px solid var(--border);
        background:${active?'var(--accent-l)':'transparent'};
        transition:background .1s;"
      onmouseover="if('${ol.id}'!=='${currentOutlineId||''}')this.style.background='var(--bg3)'"
      onmouseout="if('${ol.id}'!=='${currentOutlineId||''}')this.style.background='transparent'">
      <span style="font-size:13px;color:var(--text3);flex-shrink:0;">${active?'▶':'○'}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:12px;font-weight:${active?'600':'400'};color:${active?'var(--accent-d)':'var(--text)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(ol.title)}</div>
        <div style="font-family:'Hiragino Kaku Gothic ProN',sans-serif;font-size:10px;color:var(--text3);margin-top:1px;">${ol.items.length}件 · ${fmtDate(ol.updatedAt)}</div>
      </div>
      <button onclick="event.stopPropagation();deleteOutline('${ol.id}')"
        style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3);padding:2px 4px;border-radius:3px;flex-shrink:0;"
